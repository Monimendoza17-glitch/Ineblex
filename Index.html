<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaKids Pro - Fonemas y Trazos</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #6C5CE7; --s: #00CEC9; --admin: #e84393; --docente: #0984e3; --bg: #f0f7fa; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
 
        .sidebar { position: fixed; left: -300px; top: 0; width: 280px; height: 100%; background: white; transition: 0.4s; z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.1); padding: 20px; border-radius: 0 30px 30px 0; }
        .sidebar.open { left: 0; }
        .sidebar h2 { font-family: 'Fredoka One'; color: var(--p); border-bottom: 3px solid var(--bg); padding-bottom: 10px; }
        .sidebar button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; background: #f1f2f6; text-align: left; transition: 0.3s; }
        .sidebar button:hover { background: var(--p); color: white; }
 
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 30px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 600px; }
         
        .btn { background: var(--p); color: white; border: none; padding: 12px 25px; border-radius: 50px; font-family: 'Fredoka One'; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 15px; border: 2px solid #eee; box-sizing: border-box; }
 
        .fonemas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; width: 100%; margin-top: 20px; }
        .fonema-card { background: white; border: 3px solid var(--s); padding: 15px; border-radius: 20px; cursor: pointer; font-size: 1.5rem; font-family: 'Fredoka One'; color: var(--p); }
        
        #canvas-box { position: relative; background: white; border: 5px dashed var(--p); border-radius: 30px; margin: 15px; width: 320px; height: 320px; }
        canvas { border-radius: 25px; touch-action: none; cursor: crosshair; }
        .guide-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12rem; color: #f0f0f0; z-index: 1; pointer-events: none; font-family: 'Fredoka One'; }
 
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
 
    <button onclick="toggleMenu()" style="position:fixed; top:20px; left:20px; z-index:1001; padding:10px 15px; border-radius:12px; border:none; background:white; font-size:1.5rem; cursor:pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">☰</button>
 
    <div id="sidebar" class="sidebar">
        <h2 id="side-title">EducaKids</h2>
        <div id="menu-options">
            <!-- Se llena dinámicamente -->
        </div>
        <hr>
        <button onclick="location.reload()" style="background:#ff7675; color:white;">🚪 Cerrar Sesión</button>
    </div>
 
    <div id="login-screen" class="screen active">
        <div class="card" style="max-width: 350px; text-align: center;">
            <img src="https://flaticon.com" width="100">
            <h1>¡Bienvenidos!</h1>
            <input type="text" id="u-in" placeholder="Usuario">
            <input type="password" id="p-in" placeholder="Contraseña">
            <button class="btn" onclick="auth()" style="width:100%">Entrar al Mundo Mágico</button>
        </div>
    </div>
 
    <div id="admin-screen" class="screen">
        <div class="card">
            <h1>🛠 Panel de Administración</h1>
            <div id="admin-controls">
                <h3>Usuarios Actuales</h3>
                <table id="user-table">
                    <thead><tr><th>Usuario</th><th>Rol</th><th>Acciones</th></tr></thead>
                    <tbody id="user-body"></tbody>
                </table>
                <br>
                <button class="btn" onclick="promptAddUser()">+ Añadir Usuario</button>
                <button class="btn" style="background:var(--admin)">Añadir Nueva Función</button>
            </div>
        </div>
    </div>
 
    <div id="teacher-screen" class="screen">
        <div class="card" style="max-width: 800px;">
            <h1>🍎 Registro Docente</h1>
            <div class="fonemas-grid">
                <button class="btn" onclick="showTeacherSection('students')">Mis Estudiantes</button>
                <button class="btn" onclick="showTeacherSection('tasks')">Asignar Tareas</button>
                <button class="btn" onclick="showTeacherSection('stories')">Subir Cuentos</button>
            </div>
            <div id="teacher-content" style="margin-top:20px;">
                <!-- Formulario de Estudiantes -->
                <div id="sec-students" class="hidden">
                    <h3>Nuevo Estudiante</h3>
                    <input type="text" id="new-stu-name" placeholder="Nombre completo">
                    <button class="btn" onclick="saveStudent()">Archivar Estudiante</button>
                    <table id="stu-table"><thead><tr><th>Nombre</th><th>Progreso</th></tr></thead><tbody id="stu-body"></tbody></table>
                </div>
                <!-- Sección de Cuentos -->
                <div id="sec-stories" class="hidden">
                    <h3>Compartir Cuento</h3>
                    <input type="text" id="story-link" placeholder="Enlace del video o archivo">
                    <button class="btn" onclick="alert('Cuento asignado al estudiante')">Asignar Cuento</button>
                </div>
            </div>
        </div>
    </div>

    
    <div id="student-screen" class="screen">
        <h1 style="color:var(--p); font-family:'Fredoka One'">¡Mis Tareas!</h1>
        <div id="fonema-selector" class="card">
            <h3>Toca un fonema para practicar:</h3>
            <div class="fonemas-grid" id="fonemas-list"></div>
        </div>

        <div id="canvas-area" class="hidden screen" style="position:fixed; background:var(--bg); top:0; left:0;">
            <h2 id="task-title" style="font-family:'Fredoka One'">Traza y Repite</h2>
            <div id="canvas-box">
                <canvas id="canvas" width="320" height="320"></canvas>
                <div id="guide" class="guide-text">MA</div>
            </div>
            <div>
                <button class="btn" onclick="clearCanvas()" style="background:#aaa">Borrar</button>
                <button class="btn" onclick="saveTask()" style="background:var(--s)">¡Enviar Tarea!</button>
                <button class="btn" onclick="speakLetter()" style="background:orange">🔊 Escuchar</button>
            </div>
        </div>
    </div>

    <script>
         
        let users = JSON.parse(localStorage.getItem('edu_users')) || [
            {u: 'admin', p: 'admin123', r: 'admin'},
            {u: 'profe', p: 'profe123', r: 'teacher'},
            {u: 'niño', p: '123', r: 'student'}
        ];
        let currentFonema = "";

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function auth() {
            const u = document.getElementById('u-in').value;
            const p = document.getElementById('p-in').value;
            const user = users.find(x => x.u === u && x.p === p);
            if(user) {
                showScreen(user.r + '-screen');
                setupMenu(user.r);
            } else { alert("Usuario o clave incorrecta"); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setupMenu(role) {
            const m = document.getElementById('menu-options');
            m.innerHTML = "";
            if(role === 'student') {
                m.innerHTML = '<button onclick="showFonemas()">📚 Fonemas (Ma, Pa, Sa...)</button><button>🎨 Dibujo Libre</button><button>📖 Cuentos</button>';
                generateFonemas();
            } else if(role === 'teacher') {
                m.innerHTML = '<button onclick="showTeacherSection(\'students\')">👥 Mis Alumnos</button><button>📊 Calificaciones</button>';
            } else if(role === 'admin') {
                m.innerHTML = '<button onclick="renderAdmin()">🛠 Gestionar Usuarios</button><button>⚙️ Configuración Aplicación</button>';
            }
        }
 
        function generateFonemas() {
            const list = ["MA", "ME", "MI", "MO", "MU", "PA", "PE", "PI", "PO", "PU", "SA", "SE", "SI", "SO", "SU", "LA", "LE", "LI", "LO", "LU"];
            const container = document.getElementById('fonemas-list');
            container.innerHTML = "";
            list.forEach(f => {
                container.innerHTML += `<div class="fonema-card" onclick="openPractice('${f}')">${f}</div>`;
            });
        }

        function openPractice(f) {
            currentFonema = f;
            document.getElementById('canvas-area').classList.remove('hidden');
            document.getElementById('guide').innerText = f;
            initCanvas();
        }
 
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function initCanvas() {
            ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.strokeStyle = '#6C5CE7';
            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                return {x, y};
            };
            canvas.onmousedown = canvas.ontouchstart = (e) => { drawing = true; const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
            canvas.onmousemove = canvas.ontouchmove = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
            window.onmouseup = window.ontouchend = () => { drawing = false; ctx.beginPath(); };
        }

        function clearCanvas() { ctx.clearRect(0,0,320,320); }
        function speakLetter() {
            const u = new SpeechSynthesisUtterance(currentFonema);
            u.lang = 'es-ES'; window.speechSynthesis.speak(u);
        }
        function saveTask() {
            alert("¡Tarea guardada! Tu profesor recibirá la imagen de tu escritura.");
            document.getElementById('canvas-area').classList.add('hidden');
        }
 
        function showTeacherSection(id) {
            document.getElementById('sec-students').classList.add('hidden');
            document.getElementById('sec-stories').classList.add('hidden');
            document.getElementById('sec-' + id).classList.remove('hidden');
        }
 
        function renderAdmin() {
            const b = document.getElementById('user-body');
            b.innerHTML = users.map((u, i) => `<tr><td>${u.u}</td><td>${u.r}</td><td><button onclick="delUser(${i})">Eliminar</button></td></tr>`).join('');
        }
        function delUser(i) { users.splice(i,1); localStorage.setItem('edu_users', JSON.stringify(users)); renderAdmin(); }
        function promptAddUser() {
            const u = prompt("Nombre de usuario:");
            const p = prompt("Contraseña:");
            const r = prompt("Rol (student, teacher, admin):");
            if(u && p && r) { users.push({u, p, r}); localStorage.setItem('edu_users', JSON.stringify(users)); renderAdmin(); }
        }

        <!-- BLOQUE DE CONEXIÓN FINAL - NO MODIFICA TU CÓDIGO ANTERIOR -->
<script type="module">
  import { initializeApp } from "https://gstatic.com";
  import { getFirestore, collection, addDoc } from "https://gstatic.com";
 
  const firebaseConfig = {
    apiKey: "AIzaSyDFn9aKKu8uaTo9GNc12MxtC26bNN2DwnM",
    authDomain: "://firebaseapp.com",
    projectId: "inblx-66997",
    storageBucket: "inblx-66997.firebasestorage.app",
    messagingSenderId: "725077663020",
    appId: "1:725077663020:web:48fb4ce3327aa22fe32089"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
 
  const originalSaveTask = window.saveTask; // Guarda tu función original
  window.saveTask = async function() {
    if (originalSaveTask) originalSaveTask(); // Ejecuta lo tuyo primero
    
    const canvas = document.getElementById('canvas');
    const trazo = canvas.toDataURL();
    const usuario = document.getElementById('u-in').value || "Estudiante";

    try {
      await addDoc(collection(db, "registros_actividades"), {
        estudiante: usuario,
        actividad: "Trazo de Fonema",
        detalle: currentFonema, // Usa la variable que ya tienes en tu código
        imagen: trazo,
        fecha: new Date().toLocaleString()
      });
      console.log("¡Copia guardada en Firebase con éxito!");
    } catch (e) {
      console.error("Error al respaldar en la nube:", e);
    }
  };
 
  const originalSaveStudent = window.saveStudent;
  window.saveStudent = async function() {
    if (originalSaveStudent) originalSaveStudent();
    
    const nombre = document.getElementById('new-stu-name').value;
    try {
      await addDoc(collection(db, "estudiantes_registrados"), {
        nombre: nombre,
        registradoPor: "Docente",
        fecha: new Date().toLocaleString()
      });
    } catch (e) { console.log(e); }
  };
         // --- FUNCIÓN PARA MOSTRAR LOS DATOS EN EL PANEL DEL DOCENTE ---
  import { getDocs, query, orderBy } from "https://gstatic.com";
 
  const originalShowTeacherSection = window.showTeacherSection;
  window.showTeacherSection = async function(section) {
    if (originalShowTeacherSection) originalShowTeacherSection(section); // Ejecuta tu lógica original

    if (section === 'students') {
        const tbody = document.getElementById('stu-body');
        tbody.innerHTML = "<tr><td colspan='2'>Cargando registros desde la nube...</td></tr>";

        try {
            // Traemos los datos de la colección "registros_actividades" que creamos antes
            const q = query(collection(db, "registros_actividades"), orderBy("fecha", "desc"));
            const querySnapshot = await getDocs(q);
            
            tbody.innerHTML = ""; // Limpiamos el mensaje de carga

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${data.estudiante}</strong><br><small>${data.fecha}</small></td>
                        <td>
                            Practicó: ${data.detalle}<br>
                            <img src="${data.imagen}" style="width:60px; border:1px solid #ddd; border-radius:5px; background:#f9f9f9;">
                        </td>
                    </tr>`;
            });
            
            if (querySnapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='2'>No hay actividades registradas aún.</td></tr>";
            }
        } catch (error) {
            console.error("Error al obtener datos: ", error);
            tbody.innerHTML = "<tr><td colspan='2'>Error al conectar con la base de datos.</td></tr>";
        }
    }
  };
          // --- FUNCIÓN PARA QUE EL DOCENTE ASIGNE CUENTOS ---
  
  // Interceptamos el botón "Asignar Cuento" de tu HTML
  document.addEventListener('click', async (e) => {
    if (e.target.innerText === "Asignar Cuento") {
        const linkCuento = document.getElementById('story-link').value;
        const nombreEstudiante = document.getElementById('new-stu-name').value || "Todos";

        if (!linkCuento) return alert("Por favor, ingresa un enlace o título del cuento");

        try {
            await addDoc(collection(db, "cuentos_asignados"), {
                estudiante: nombreEstudiante,
                url: linkCuento,
                fecha: new Date().toLocaleString(),
                visto: false
            });
            alert("¡Cuento asignado y guardado en la nube! 📚");
            document.getElementById('story-link').value = ""; // Limpiar campo
        } catch (error) {
            console.error("Error al asignar cuento:", error);
        }
    }
  });

  // --- FUNCIÓN PARA QUE EL ESTUDIANTE VEA SUS CUENTOS ---

  window.cargarMisCuentos = async function() {
    const contenedor = document.getElementById('fonema-selector'); // Usamos el contenedor de tareas del niño
    try {
        const q = query(collection(db, "cuentos_asignados"), orderBy("fecha", "desc"));
        const querySnapshot = await getDocs(q);
        
        if (!querySnapshot.empty) {
            let htmlCuentos = `<h3>📖 Mis Cuentos Asignados:</h3><div style="display:flex; gap:10px; flex-wrap:wrap;">`;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                htmlCuentos += `
                    <div style="background:#fff3cd; padding:10px; border-radius:15px; border:2px dashed #ffae00; cursor:pointer;" 
                         onclick="window.open('${data.url}', '_blank')">
                        <span style="font-size:1.2rem;">🎬</span> Ver Cuento
                    </div>`;
            });
            htmlCuentos += `</div><hr>`;
            // Insertamos los cuentos arriba de la lista de fonemas
            contenedor.insertAdjacentHTML('afterbegin', htmlCuentos);
        }
    } catch (e) { console.log("Aún no hay cuentos"); }
  };

  // Ejecutar carga de cuentos si el usuario es estudiante
  if (document.getElementById('student-screen').classList.contains('active')) {
      window.cargarMisCuentos();
  }
import { initializeApp } from "firebase/app";

};
 
const app = initializeApp(firebaseConfig);
 
export default app;

 console.log("Sistema de Firebase configurado correctamente.");

</script>
 
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Visitas Appwrite FUNCIONAL</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<style>
body{font-family:Arial;background:#111827;color:white;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#1f2937;padding:20px;border-radius:10px;margin-bottom:20px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px}
button{background:#22c55e;color:white;cursor:pointer}
table{width:100%;margin-top:10px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #374151}
</style>
</head>
<body>

<div class="container" id="loginBox">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>
</div>

<div class="container" id="app" style="display:none">
<div class="card">
<h2>Registro de Visitas</h2>
<input id="nombre" placeholder="Nombre">
<input id="motivo" placeholder="Motivo">
<button onclick="entrada()">Entrada</button>
<button onclick="salida()">Salida</button>
<button onclick="logout()" style="background:#ef4444">Salir</button>
</div>

<div class="card">
<h3>Historial</h3>
<table>
<thead>
<tr><th>Nombre</th><th>Motivo</th><th>Entrada</th><th>Salida</th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>

<script>
const client = new Appwrite.Client()
.setEndpoint('https://cloud.appwrite.io/v1')
.setProject('69d2d612001d83635dd3');

const account = new Appwrite.Account(client);
const db = new Appwrite.Databases(client);

const DB = '69d2d6bf0023f2fbbfc4';
const COL = '69d2e01c00197a2f5645';

async function login(){
try{
await account.createEmailSession(
document.getElementById('email').value,
document.getElementById('password').value
);
mostrarApp();
}catch(e){alert(e.message);console.log(e)}
}

async function logout(){
await account.deleteSession('current');
location.reload();
}

function mostrarApp(){
document.getElementById('loginBox').style.display='none';
document.getElementById('app').style.display='block';
cargar();
}

async function entrada(){
let nombre=document.getElementById('nombre').value;
let motivo=document.getElementById('motivo').value;
if(!nombre||!motivo){alert('Completa');return}

await db.createDocument(DB,COL,'unique()',{
nombre,motivo,entrada:new Date().toLocaleString(),salida:''
});
cargar();
}

async function salida(){
let nombre=document.getElementById('nombre').value;
let res=await db.listDocuments(DB,COL);
let v=res.documents.reverse().find(x=>x.nombre==nombre && !x.salida);
if(v){
await db.updateDocument(DB,COL,v.$id,{salida:new Date().toLocaleString()});
}else{alert('No encontrado')}
cargar();
}

async function cargar(){
let res=await db.listDocuments(DB,COL);
let t=document.getElementById('tabla');
t.innerHTML='';
res.documents.forEach(v=>{
t.innerHTML+=`<tr><td>${v.nombre}</td><td>${v.motivo}</td><td>${v.entrada}</td><td>${v.salida||''}</td></tr>`;
});
}

async function check(){
try{await account.get();mostrarApp()}catch(e){console.log('no login')}}
check();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas Local</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-out { background: var(--error); margin-top: 20px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { color: #94a3b8; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; background: #334155; }
    </style>
</head>
<body>

    <!-- SECCIÓN 1: LOGIN (Usuario: admin / Clave: 1234) -->
    <div id="login-section" class="card">
        <h2>🔒 Acceso al Sistema</h2>
        <p style="text-align: center; font-size: 0.8rem; color: #94a3b8;">Usa: admin / 1234</p>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="handleLogin()">Iniciar Sesión</button>
        <div id="error-msg" style="color: var(--error); text-align: center; margin-top: 10px; font-size: 0.9rem;"></div>
    </div>

    <!-- SECCIÓN 2: APLICACIÓN PRINCIPAL -->
    <div id="app-section" class="card hidden" style="max-width: 800px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0;">📋 Registro de Visitas</h2>
            <button onclick="handleLogout()" style="width: auto; padding: 5px 15px; margin: 0; background: #475569;">Salir</button>
        </div>

        <div style="margin-top: 20px;">
            <input type="text" id="v-nombre" placeholder="Nombre del visitante">
            <input type="text" id="v-motivo" placeholder="Motivo de la visita">
            <button onclick="agregarVisita()">Registrar Entrada</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Visitante</th>
                        <th>Entrada</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
        <button onclick="limpiarTodo()" class="btn-out" style="background: #334155; font-size: 0.7rem;">Limpiar Historial</button>
    </div>

<script>
    // --- LÓGICA DE LOGIN ---
    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === '1234') {
            localStorage.setItem('sesion_visitas', 'activa');
            mostrarApp();
        } else {
            document.getElementById('error-msg').innerText = "Usuario o clave incorrectos";
        }
    }

    function handleLogout() {
        localStorage.removeItem('sesion_visitas');
        location.reload();
    }

    function mostrarApp() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        renderVisitas();
    }

    // --- LÓGICA DE DATOS ---
    let visitas = JSON.parse(localStorage.getItem('datos_visitas')) || [];

    function agregarVisita() {
        const nombre = document.getElementById('v-nombre').value;
        const motivo = document.getElementById('v-motivo').value;

        if(!nombre || !motivo) return alert("Por favor completa los campos");

        const nuevaVisita = {
            id: Date.now(),
            nombre: nombre,
            motivo: motivo,
            hora: new Date().toLocaleString(),
            salida: null
        };

        visitas.unshift(nuevaVisita);
        guardarYRender();
        document.getElementById('v-nombre').value = '';
        document.getElementById('v-motivo').value = '';
    }

    function marcarSalida(id) {
        visitas = visitas.map(v => {
            if(v.id === id) v.salida = new Date().toLocaleTimeString();
            return v;
        });
        guardarYRender();
    }

    function guardarYRender() {
        localStorage.setItem('datos_visitas', JSON.stringify(visitas));
        renderVisitas();
    }

    function renderVisitas() {
        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = '';

        visitas.forEach(v => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${v.nombre}</b><br><small style="color:#94a3b8">${v.motivo}</small></td>
                    <td>${v.hora}</td>
                    <td>
                        ${v.salida 
                            ? `<span class="status">Salió: ${v.salida}</span>` 
                            : `<button onclick="marcarSalida(${v.id})" style="width:auto; padding:4px 10px; font-size:0.7rem; margin:0; background:#eab308">Salida</button>`
                        }
                    </td>
                </tr>
            `;
        });
    }

    function limpiarTodo() {
        if(confirm("¿Borrar todo el historial?")) {
            visitas = [];
            guardarYRender();
        }
    }

    // --- AL CARGAR ---
    if(localStorage.getItem('sesion_visitas') === 'activa') {
        mostrarApp();
    }
</script>

</body>
</html>

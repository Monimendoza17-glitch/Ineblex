<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Profesional de Visitas</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer}
button:hover{opacity:0.9}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #334155}
</style>
</head>
<body>

<div class="container" id="loginBox">
<div class="card">
<h2>🔐 Iniciar Sesión</h2>
<input type="email" id="email" placeholder="Correo" required>
<input type="password" id="password" placeholder="Contraseña" required>
<button onclick="login()">Ingresar</button>
</div>
</div>

<div class="container" id="app" style="display:none">
<div class="card">
<h2>📋 Registro de Visitas</h2>
<input id="nombre" placeholder="Nombre del visitante">
<input id="motivo" placeholder="Motivo">
<button onclick="registrarEntrada()">Registrar Entrada</button>
<button onclick="registrarSalida()">Registrar Salida</button>
<button onclick="logout()" style="background:#ef4444">Cerrar sesión</button>
</div>

<div class="card">
<h3>📊 Historial</h3>
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Motivo</th>
<th>Entrada</th>
<th>Salida</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>
</div>

<script>
// CONFIGURACIÓN SEGURA
const client = new Appwrite.Client();
client
.setEndpoint('https://nyc.cloud.appwrite.io/v1')
.setProject('69d438fc0031adffdc0d');

const account = new Appwrite.Account(client);
const databases = new Appwrite.Databases(client);

const DATABASE_ID = '69d4395000137ebeb963';
const COLLECTION_ID = 'visitdb';

// LOGIN
async function login(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

if(!email || !password){
alert('Completa los campos');
return;
}

try{
await account.createEmailSession(email, password);
mostrarApp();
}catch(error){
console.error(error);
alert('Error: ' + error.message);
}
}

// LOGOUT
async function logout(){
await account.deleteSession('current');
location.reload();
}

// MOSTRAR APP
function mostrarApp(){
document.getElementById('loginBox').style.display='none';
document.getElementById('app').style.display='block';
cargarVisitas();
}

// REGISTRAR ENTRADA
async function registrarEntrada(){
const nombre = document.getElementById('nombre').value;
const motivo = document.getElementById('motivo').value;

if(!nombre || !motivo){
alert('Completa los datos');
return;
}

try{
await databases.createDocument(DATABASE_ID, COLLECTION_ID, 'unique()', {
nombre: nombre,
motivo: motivo,
entrada: new Date().toLocaleString(),
salida: ''
});

cargarVisitas();
}catch(error){
console.error(error);
alert('Error al guardar');
}
}

// REGISTRAR SALIDA
async function registrarSalida(){
const nombre = document.getElementById('nombre').value;

try{
const res = await databases.listDocuments(DATABASE_ID, COLLECTION_ID);

const visita = res.documents.reverse().find(v => v.nombre === nombre && !v.salida);

if(!visita){
alert('No hay entrada registrada');
return;
}

await databases.updateDocument(DATABASE_ID, COLLECTION_ID, visita.$id, {
salida: new Date().toLocaleString()
});

cargarVisitas();
}catch(error){
console.error(error);
alert('Error al actualizar');
}
}

// CARGAR VISITAS
async function cargarVisitas(){
try{
const res = await databases.listDocuments(DATABASE_ID, COLLECTION_ID);
const tabla = document.getElementById('tabla');
tabla.innerHTML = '';

res.documents.forEach(v => {
tabla.innerHTML += `<tr>
<td>${v.nombre}</td>
<td>${v.motivo}</td>
<td>${v.entrada}</td>
<td>${v.salida || ''}</td>
</tr>`;
});
}catch(error){
console.error(error);
}
}

// VERIFICAR SESIÓN AUTOMÁTICA
async function verificarSesion(){
try{
await account.get();
mostrarApp();
}catch(e){
console.log('No hay sesión activa');
}
}

verificarSesion();
</script>

</body>
</html>

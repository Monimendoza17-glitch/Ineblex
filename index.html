 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas Profesional</title>
    <!-- Cargamos la librería oficial de Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h2, h3 { margin-top: 0; text-align: center; color: #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #16a34a; }
        .btn-logout { background: #ef4444; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
        th { color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <!-- BLOQUE DE LOGIN -->
    <div id="login-section" class="card">
        <h2>🔐 Acceso al Sistema</h2>
        <input type="email" id="email" placeholder="Tu correo electrónico">
        <input type="password" id="password" placeholder="Tu contraseña">
        <button onclick="handleLogin()">Entrar</button>
        <p id="login-msg" style="color: #fb7185; font-size: 13px; text-align: center;"></p>
    </div>

    <!-- BLOQUE DE LA APP (OCULTO AL INICIO) -->
    <div id="app-section" class="container" style="display: none;">
        <div class="card">
            <h3>📋 Registro de Visita</h3>
            <input type="text" id="v-nombre" placeholder="Nombre del visitante">
            <input type="text" id="v-motivo" placeholder="Motivo de la visita">
            <button onclick="registrarEntrada()">Registrar Entrada</button>
            <button onclick="registrarSalida()" style="background: #eab308;">Marcar Salida</button>
            <button onclick="handleLogout()" class="btn-logout">Cerrar Sesión</button>
        </div>

        <div class="card" style="max-width: 100%; overflow-x: auto;">
            <h3>📊 Historial Reciente</h3>
            <table>
                <thead>
                    <tr>
                        <th>Visitante</th>
                        <th>Entrada</th>
                        <th>Salida</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN (TUS DATOS)
    const SB_URL = 'https://supabase.co';
    const SB_KEY = 'sb_publishable_q-li-r301rM93noTG8r2Wg_fE4vE4YR';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // 2. FUNCIÓN DE LOGIN
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('login-msg');

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            msg.innerText = "Error: " + error.message;
        } else {
            initApp();
        }
    }

    // 3. FUNCIÓN DE LOGOUT
    async function handleLogout() {
        await _supabase.auth.signOut();
        location.reload();
    }

    // 4. INICIALIZAR APP
    function initApp() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        cargarHistorial();
    }

    // 5. REGISTRAR ENTRADA
    async function registrarEntrada() {
        const nombre = document.getElementById('v-nombre').value;
        const motivo = document.getElementById('v-motivo').value;

        if(!nombre || !motivo) return alert("Llena todos los campos");

        const { error } = await _supabase
            .from('visitas')
            .insert([{ 
                nombre: nombre, 
                motivo: motivo, 
                entrada: new Date().toLocaleString(), 
                salida: '' 
            }]);

        if (error) alert("Error al guardar: " + error.message);
        else {
            alert("¡Entrada registrada!");
            document.getElementById('v-nombre').value = "";
            document.getElementById('v-motivo').value = "";
            cargarHistorial();
        }
    }

    // 6. REGISTRAR SALIDA
    async function registrarSalida() {
        const nombre = document.getElementById('v-nombre').value;
        if(!nombre) return alert("Escribe el nombre para marcar su salida");

        // Buscamos la última visita de esa persona que no tenga salida
        const { data } = await _supabase
            .from('visitas')
            .select('*')
            .eq('nombre', nombre)
            .eq('salida', '')
            .order('id', { ascending: false })
            .limit(1);

        if (data && data.length > 0) {
            await _supabase
                .from('visitas')
                .update({ salida: new Date().toLocaleString() })
                .eq('id', data[0].id);
            
            alert("Salida registrada para " + nombre);
            cargarHistorial();
        } else {
            alert("No hay visitas activas para este nombre");
        }
    }

    // 7. CARGAR TABLA
    async function cargarHistorial() {
        const { data, error } = await _supabase
            .from('visitas')
                .select('*')
            .order('id', { ascending: false })
            .limit(10);

        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = "";

        if (data) {
            data.forEach(v => {
                cuerpo.innerHTML += `
                    <tr>
                        <td><b>${v.nombre}</b><br><small>${v.motivo}</small></td>
                        <td>${v.entrada}</td>
                        <td>${v.salida || '<i>En curso</i>'}</td>
                    </tr>
                `;
            });
        }
    }

    // 8. AUTO-LOGUEO (SI YA HAY SESIÓN)
    async function checkSession() {
        const { data } = await _supabase.auth.getSession();
        if (data.session) initApp();
    }
    checkSession();

</script>
</body>
</html>

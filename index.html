<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Visitas con Supabase</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body{margin:0;font-family:Arial;background:#0f172a;color:white}
        .container{max-width:900px;margin:auto;padding:20px}
        .card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
        input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none;box-sizing:border-box}
        button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer}
        button:hover{opacity:0.9}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{padding:10px;border-bottom:1px solid #334155;text-align:left}
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="card">
        <h2>🔐 Iniciar Sesión</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>
</div>

<div class="container" id="app" style="display:none">
    <div class="card">
        <h2>📋 Registro de Visita</h2>
        <input id="nombre" placeholder="Nombre del visitante">
        <input id="motivo" placeholder="Motivo">
        <button onclick="registrarEntrada()">Registrar Entrada</button>
        <button onclick="registrarSalida()">Registrar Salida</button>
        <button onclick="logout()" style="background:#ef4444">Cerrar sesión</button>
    </div>

    <div class="card">
        <h3>📊 Historial</h3>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Motivo</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>
    </div>
</div>

<script>
// CONFIGURACIÓN: Reemplaza con tus datos de Supabase (Project Settings > API)
const SUPABASE_URL = 'https://supabase.co';
const SUPABASE_KEY = 'sb_publishable_q-li-r301rM93noTG8r2Wg_fE4vE4YR';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN
async function login(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if(error) alert("Error: " + error.message);
    else mostrarApp();
}

// LOGOUT
async function logout(){
    await supabase.auth.signOut();
    location.reload();
}

function mostrarApp(){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('app').style.display='block';
    cargarVisitas();
}

// REGISTRAR ENTRADA
async function registrarEntrada(){
    const nombre = document.getElementById('nombre').value;
    const motivo = document.getElementById('motivo').value;

    const { error } = await supabase.from('visitas').insert([
        { nombre, motivo, entrada: new Date().toLocaleString(), salida: '' }
    ]);

    if(error) alert("Error al guardar");
    else { alert("Entrada registrada"); cargarVisitas(); }
}

// REGISTRAR SALIDA
async function registrarSalida(){
    const nombre = document.getElementById('nombre').value;
    const { data } = await supabase.from('visitas').select('*').eq('nombre', nombre).is('salida', '');
    
    if(data && data.length > 0){
        await supabase.from('visitas').update({ salida: new Date().toLocaleString() }).eq('id', data[0].id);
        alert("Salida registrada");
        cargarVisitas();
    } else {
        alert("No se encontró una entrada pendiente");
    }
}

// CARGAR TABLA
async function cargarVisitas(){
    const { data, error } = await supabase.from('visitas').select('*').order('id', { ascending: false });
    const tabla = document.getElementById('tabla');
    tabla.innerHTML = '';
    data.forEach(v => {
        tabla.innerHTML += `<tr>
            <td>${v.nombre}</td>
            <td>${v.motivo}</td>
            <td>${v.entrada}</td>
            <td>${v.salida || '-'}</td>
        </tr>`;
    });
}

// VERIFICAR SESIÓN AL CARGAR
async function checkUser(){
    const { data: { user } } = await supabase.auth.getUser();
    if(user) mostrarApp();
}
checkUser();
</script>
</body>
</html>
